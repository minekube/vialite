name: CI

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'docs/**'
      - 'build/**'
      - 'Taskfile.yml'
      - 'mise.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'docs/**'
      - 'build/**'
      - 'Taskfile.yml'
      - 'mise.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Test Go module
        working-directory: go
        run: go test ./...

  java-overlay-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Test ViaProxy overlay
        run: |
          bash build/apply-overlay.sh
          cd build/.work/ViaProxy
          ./gradlew :vialite-native:test --no-daemon --no-configuration-cache

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install lint tools
        run: |
          npm install -g markdownlint-cli2@0.22.1
          python -m pip install yamllint==1.38.0

      - name: Lint markdown and YAML
        run: |
          markdownlint-cli2 '**/*.md' '#build/.work/**'
          yamllint .
