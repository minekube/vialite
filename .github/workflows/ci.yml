name: CI

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'docs/**'
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'docs/**'
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Test Go module
        working-directory: go
        run: go test ./...

      - name: Cross-compile Windows Go module
        working-directory: go
        run: GOOS=windows GOARCH=amd64 go test -c -o /tmp/vialite-windows-amd64.test.exe .

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install lint tools
        run: |
          npm install -g markdownlint-cli2@0.22.1
          python -m pip install yamllint==1.38.0

      - name: Lint markdown and YAML
        run: |
          markdownlint-cli2 '**/*.md' '#build/.work/**'
          yamllint .
