name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr_number: ${{ steps.rp.outputs.pr }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(echo '${{ steps.rp.outputs.pr }}' | jq -r '.number')
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --merge

          # Merges done with GITHUB_TOKEN do not trigger a new push workflow.
          # Run this workflow again on main so release-please observes the
          # merged release PR and creates the tag/GitHub release.
          gh workflow run release-please.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"

  trigger-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: { release_tag: '${{ needs.release-please.outputs.tag_name }}' }
            })

  dispatch-gate-bump:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: minekube/actions/.github/workflows/dispatch-workflow.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      target-repository: gate
      target-workflow: bump-managed-dependency.yml
      target-ref: master
      inputs-json: |
        {
          "dependency": "vialite",
          "version": "${{ needs.release-please.outputs.tag_name }}",
          "source_repository": "${{ github.repository }}",
          "source_release_url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}"
        }
    secrets: inherit
