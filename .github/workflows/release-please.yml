name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  trigger-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: { release_tag: '${{ needs.release-please.outputs.tag_name }}' }
            })

  dispatch-gate-bump:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create release cascade token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_CASCADE_APP_ID }}
          private-key: ${{ secrets.RELEASE_CASCADE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: gate
          permission-actions: write

      - name: Dispatch Gate dependency bump
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh workflow run bump-managed-dependency.yml \
            --repo "${{ github.repository_owner }}/gate" \
            --ref master \
            -f dependency=vialite \
            -f version="${TAG_NAME}" \
            -f source_repository="${{ github.repository }}" \
            -f source_release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG_NAME}"
